services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-usage_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-usage_dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usage_dashboard} -d ${POSTGRES_DB:-usage_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/skulldorom/usage-dashboard-backend:${IMAGE_TAG:-main}}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://usage_dashboard:change-me@db:5432/usage_dashboard}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env. See .env.example.}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:${NGINX_HTTP_PORT:-3000},http://127.0.0.1:${NGINX_HTTP_PORT:-3000}}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/skulldorom/usage-dashboard-frontend:${IMAGE_TAG:-main}}
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-3000}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
